<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Registration - Ticket System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #232526 0%, #414345 100%);
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .register-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 35px;
            width: 100%;
            max-width: 500px;
            color: white;
        }
        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            border-radius: 10px;
        }
        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            border-color: #667eea;
            box-shadow: none;
        }
        .form-select option { background: #333; color: white; }
        .btn-register {
            background: #667eea;
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-weight: 700;
            margin-top: 20px;
            text-transform: uppercase;
        }
        .btn-register:hover { background: #764ba2; }
        .form-label { color: rgba(255,255,255,0.7); font-size: 0.9rem; }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }
        .toast-success {
            background: linear-gradient(135deg, #1a7a4a, #23a566);
            border: none;
            border-radius: 14px;
            color: white;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .toast-error {
            background: linear-gradient(135deg, #8b1a1a, #c0392b);
            border: none;
            border-radius: 14px;
            color: white;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .toast-icon {
            font-size: 1.4rem;
            margin-right: 10px;
        }
        .toast-body {
            font-size: 0.95rem;
            font-weight: 500;
            padding: 14px 16px;
            display: flex;
            align-items: center;
        }
        .toast-progress {
            height: 3px;
            background: rgba(255,255,255,0.4);
            border-radius: 0 0 14px 14px;
            animation: shrink 3s linear forwards;
        }
        @keyframes shrink {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>
<body>

    <!-- ── Success Toast ───────────────────── -->
    <div th:if="${success}" class="toast-container">
        <div class="toast toast-success show" role="alert" id="successToast">
            <div class="toast-body">
                <span class="toast-icon">✅</span>
                <div>
                    <div class="fw-bold">Admin Registered!</div>
                    <div class="small opacity-75" th:text="${success}"></div>
                </div>
            </div>
            <div class="toast-progress"></div>
        </div>
    </div>

    <!-- ── Error Toast ─────────────────────── -->
    <div th:if="${error}" class="toast-container">
        <div class="toast toast-error show" role="alert" id="errorToast">
            <div class="toast-body">
                <span class="toast-icon">❌</span>
                <div>
                    <div class="fw-bold">Registration Failed</div>
                    <div class="small opacity-75" th:text="${error}"></div>
                </div>
            </div>
            <div class="toast-progress"></div>
        </div>
    </div>

    <div class="register-card shadow-lg">
        <div class="text-center mb-4">
            <div style="font-size: 2.5rem; margin-bottom: 10px;">📋</div>
            <h2 class="fw-bold">Create Admin Account</h2>
            <p class="text-white-50">Authorized Personnel Only</p>
        </div>

        <form th:action="@{/admin/registerAdmin}" th:object="${admin}" method="post">
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">First Name</label>
                    <input type="text" th:field="*{firstName}" class="form-control" placeholder="John" required>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Last Name</label>
                    <input type="text" th:field="*{lastName}" class="form-control" placeholder="Doe" required>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" th:field="*{email}" class="form-control" placeholder="admin@company.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Phone Number</label>
                <input type="text" th:field="*{phoneNumber}" class="form-control" placeholder="9876543210">
            </div>

            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" th:field="*{password}" class="form-control" placeholder="••••••••" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Assigned Department</label>
                <select class="form-select" th:field="*{departmentId}" required>
                    <option value="" selected disabled>Select Department</option>
                    <option th:each="dept : ${departments}"
                            th:value="${dept.id}"
                            th:text="${dept.name}">
                    </option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary w-100 btn-register">
                Register Admin
            </button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/admin/login}" class="text-white-50 text-decoration-none small">
                Already have an account? Login
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss toast after 3 seconds
        setTimeout(() => {
            const toasts = document.querySelectorAll('.toast');
            toasts.forEach(t => {
                t.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                t.style.opacity = '0';
                t.style.transform = 'translateY(20px)';
                setTimeout(() => t.remove(), 500);
            });
        }, 3000);
    </script>
</body>
</html>
