<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Ticket Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
            padding: 40px;
        }

        .register-container h1 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-control {
            border: 1px solid #ddd;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 5px;
        }

        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }

        .btn-register {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            margin-top: 10px;
        }

        .btn-register:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }

        .login-link {
            text-align: center;
            margin-top: 15px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .password-wrapper {
            position: relative;
            margin-bottom: 12px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 12px;
            cursor: pointer;
            color: #667eea;
            background: none;
            border: none;
            padding: 0;
        }

        .toggle-password:hover { color: #764ba2; }

        .password-strength {
            margin-top: -8px;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .strength-bar {
            height: 5px;
            border-radius: 3px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
            background-color: #e9ecef;
        }

        .strength-weak  { background-color: #dc3545; width: 33%; }
        .strength-fair  { background-color: #ffc107; width: 66%; }
        .strength-strong { background-color: #28a745; width: 100%; }

        .warning-text { color: #dc3545; font-size: 0.85rem; }
        .success-text { color: #28a745; font-size: 0.85rem; }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 9999;
        }
        .toast-error {
            background: linear-gradient(135deg, #8b1a1a, #c0392b);
            border: none;
            border-radius: 14px;
            color: white;
            min-width: 320px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .toast-body {
            font-size: 0.95rem;
            font-weight: 500;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .toast-icon { font-size: 1.4rem; }
        .toast-progress {
            height: 3px;
            background: rgba(255,255,255,0.4);
            border-radius: 0 0 14px 14px;
            animation: shrink 4s linear forwards;
        }
        @keyframes shrink {
            from { width: 100%; }
            to   { width: 0%; }
        }
    </style>
</head>
<body>

    <!-- Error toast — registration failed -->
    <div th:if="${error}" class="toast-container">
        <div class="toast toast-error show" role="alert">
            <div class="toast-body">
                <span class="toast-icon">❌</span>
                <div>
                    <div class="fw-bold">Registration Failed</div>
                    <div class="small opacity-75" th:text="${error}"></div>
                </div>
            </div>
            <div class="toast-progress"></div>
        </div>
    </div>

    <div class="register-container">
        <h1>Create Account</h1>

        <form th:action="@{/register}" th:object="${user}" method="post">
            <div class="row">
                <div class="col-md-6">
                    <input type="text" th:field="*{firstName}" class="form-control"
                           placeholder="First Name" required>
                </div>
                <div class="col-md-6">
                    <input type="text" th:field="*{lastName}" class="form-control"
                           placeholder="Last Name" required>
                </div>
            </div>

            <input type="email" th:field="*{email}" class="form-control"
                   placeholder="Email Address" required>
            <input type="tel" th:field="*{phoneNumber}" class="form-control"
                   placeholder="Phone Number">

            <div class="password-wrapper">
                <input type="password" th:field="*{password}" id="password"
                       class="form-control" placeholder="Password" required
                       style="padding-right:45px">
                <button type="button" class="toggle-password" id="togglePassword">
                    <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" fill="none"
                         viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
            </div>
            <div class="password-strength" id="passwordStrength"></div>
            <div class="strength-bar" id="strengthBar"></div>

            <div class="password-wrapper">
                <input type="password" id="confirmPassword" class="form-control"
                       placeholder="Confirm Password" required style="padding-right:45px">
                <button type="button" class="toggle-password" id="toggleConfirmPassword">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                         stroke-width="1.5" stroke="currentColor" width="24" height="24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                    </svg>
                </button>
            </div>

            <div class="mb-2 form-check">
                <input type="checkbox" class="form-check-input" id="terms" required>
                <label class="form-check-label" for="terms">
                    I agree to the Terms and Conditions
                </label>
            </div>

            <button type="submit" class="btn btn-register">Create Account</button>
        </form>

        <div class="login-link">
            Already have an account? <a th:href="@{/login}">Login here</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-dismiss toasts
        setTimeout(() => {
            document.querySelectorAll('.toast').forEach(t => {
                t.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
                t.style.opacity = '0';
                t.style.transform = 'translateY(20px)';
                setTimeout(() => t.remove(), 500);
            });
        }, 4000);

        const eyeSvg = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>`;
        const eyeOffSvg = `<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" width="24" height="24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" /></svg>`;

        // Password toggle
        const passwordInput = document.getElementById('password');
        document.getElementById('togglePassword').addEventListener('click', function(e) {
            e.preventDefault();
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? eyeSvg : eyeOffSvg;
        });

        // Confirm password toggle
        const confirmInput = document.getElementById('confirmPassword');
        document.getElementById('toggleConfirmPassword').addEventListener('click', function(e) {
            e.preventDefault();
            const type = confirmInput.getAttribute('type') === 'password' ? 'text' : 'password';
            confirmInput.setAttribute('type', type);
            this.innerHTML = type === 'password' ? eyeSvg : eyeOffSvg;
        });

        // Password strength checker
        function checkPasswordStrength(password) {
            const strengthBar = document.getElementById('strengthBar');
            const strengthText = document.getElementById('passwordStrength');
            if (!password) { strengthBar.className = 'strength-bar'; strengthText.innerHTML = ''; return; }
            let strength = 0;
            let warnings = [];
            if (password.length >= 8) strength++; if (password.length >= 12) strength++;
            if (/[A-Z]/.test(password)) strength++; else warnings.push('uppercase');
            if (/[a-z]/.test(password)) strength++; else warnings.push('lowercase');
            if (/[0-9]/.test(password)) strength++; else warnings.push('numbers');
            if (/[!@#$%^&*]/.test(password)) strength++; else warnings.push('special chars');
            if (password.length < 8) warnings.unshift('min 8 characters');
            let cls = strength <= 2 ? 'strength-weak' : strength <= 4 ? 'strength-fair' : 'strength-strong';
            let label = strength <= 2 ? '⚠️ Weak' : strength <= 4 ? '⚠️ Fair' : '✓ Strong';
            strengthBar.className = 'strength-bar ' + cls;
            strengthText.innerHTML = warnings.length > 0 && strength < 5
                ? `<span class="warning-text">${label} — add ${warnings.join(', ')}</span>`
                : `<span class="success-text">${label} password</span>`;
        }

        passwordInput.addEventListener('input', function() { checkPasswordStrength(this.value); });

        // Form submit validation
        document.querySelector('form').addEventListener('submit', function(e) {
            if (passwordInput.value !== confirmInput.value) {
                e.preventDefault();
                alert('Passwords do not match!');
                return;
            }
            if (passwordInput.value.length < 8) {
                e.preventDefault();
                alert('Password must be at least 8 characters!');
            }
        });
    </script>
</body>
</html>
