<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - Ticket System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .verify-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            padding: 40px;
            text-align: center;
        }
        .otp-icon {
            width: 72px; height: 72px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            font-size: 2rem;
        }
        .otp-inputs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 24px 0;
        }
        .otp-input {
            width: 52px; height: 60px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            color: #333;
            transition: border-color 0.2s;
            outline: none;
        }
        .otp-input:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,0.2); }
        .otp-input.filled { border-color: #667eea; background: #f0f2ff; }
        .btn-verify {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none;
            border-radius: 10px; padding: 13px;
            width: 100%; font-weight: 600;
            font-size: 1rem; cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-verify:hover { opacity: 0.9; }
        .btn-verify:disabled { opacity: 0.5; cursor: not-allowed; }
        .resend-section { margin-top: 20px; font-size: 0.9rem; color: #666; }
        .resend-btn {
            background: none; border: none;
            color: #667eea; font-weight: 600;
            cursor: pointer; padding: 0;
            text-decoration: underline;
        }
        .resend-btn:disabled { color: #aaa; cursor: not-allowed; text-decoration: none; }
        .alert-success { background: #d4edda; border: 1px solid #c3e6cb;
                         color: #155724; border-radius: 8px; padding: 10px 14px;
                         font-size: 0.9rem; margin-bottom: 16px; }
        .alert-error { background: #f8d7da; border: 1px solid #f5c6cb;
                       color: #721c24; border-radius: 8px; padding: 10px 14px;
                       font-size: 0.9rem; margin-bottom: 16px; }
        #countdown { font-weight: 600; color: #667eea; }
    </style>
</head>
<body>
    <div class="verify-card">

        <div class="otp-icon">✉️</div>

        <h3 class="fw-bold mb-1">Verify Your Email</h3>
        <p class="text-muted small mb-0">
            We sent a 6-digit code to
        </p>
        <p class="fw-bold text-primary mb-3" th:text="${email}">em***@gmail.com</p>

        <!-- Success message -->
        <div th:if="${success}" class="alert-success" th:text="${success}"></div>

        <!-- Error message -->
        <div th:if="${error}" class="alert-error" th:text="${error}"></div>

        <!-- OTP form -->
        <form th:action="@{/verify/submit}" method="post" id="otpForm">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <input type="hidden" name="otp" id="otpHidden"/>

            <div class="otp-inputs">
                <input class="otp-input" type="text" maxlength="1"
                       inputmode="numeric" pattern="[0-9]" id="d1" autocomplete="off">
                <input class="otp-input" type="text" maxlength="1"
                       inputmode="numeric" pattern="[0-9]" id="d2" autocomplete="off">
                <input class="otp-input" type="text" maxlength="1"
                       inputmode="numeric" pattern="[0-9]" id="d3" autocomplete="off">
                <input class="otp-input" type="text" maxlength="1"
                       inputmode="numeric" pattern="[0-9]" id="d4" autocomplete="off">
                <input class="otp-input" type="text" maxlength="1"
                       inputmode="numeric" pattern="[0-9]" id="d5" autocomplete="off">
                <input class="otp-input" type="text" maxlength="1"
                       inputmode="numeric" pattern="[0-9]" id="d6" autocomplete="off">
            </div>

            <p class="text-muted small mb-3">
                Code expires in <span id="countdown">5:00</span>
            </p>

            <button type="submit" class="btn-verify" id="verifyBtn" disabled>
                Verify Email
            </button>
        </form>

        <!-- Resend -->
        <div class="resend-section">
            Didn't receive the code?
            <form th:action="@{/verify/resend}" method="post" class="d-inline">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="resend-btn"
                        th:disabled="${!canResend}"
                        id="resendBtn">
                    Resend OTP
                </button>
            </form>
        </div>

        <div class="mt-3">
            <a th:href="@{/register}" class="text-muted small text-decoration-none">
                ← Back to Registration
            </a>
        </div>
    </div>

    <script>
        const inputs = [
            document.getElementById('d1'),
            document.getElementById('d2'),
            document.getElementById('d3'),
            document.getElementById('d4'),
            document.getElementById('d5'),
            document.getElementById('d6')
        ];
        const verifyBtn  = document.getElementById('verifyBtn');
        const otpHidden  = document.getElementById('otpHidden');
        const otpForm    = document.getElementById('otpForm');

        // Auto-advance between boxes
        inputs.forEach((input, i) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/[^0-9]/g, '');
                if (input.value && i < 5) inputs[i + 1].focus();
                updateSubmitButton();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && i > 0) {
                    inputs[i - 1].focus();
                    inputs[i - 1].value = '';
                    updateSubmitButton();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pasted = e.clipboardData.getData('text').replace(/[^0-9]/g, '');
                pasted.split('').forEach((char, j) => {
                    if (inputs[j]) inputs[j].value = char;
                });
                updateSubmitButton();
                if (inputs[5].value) inputs[5].focus();
            });
        });

        function updateSubmitButton() {
            const otp = inputs.map(i => i.value).join('');
            otpHidden.value = otp;
            verifyBtn.disabled = otp.length !== 6;
            inputs.forEach(i => i.classList.toggle('filled', i.value !== ''));
        }

        // Countdown timer — 5 minutes
        let seconds = 5 * 60;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            seconds--;
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            countdownEl.textContent = m + ':' + String(s).padStart(2, '0');
            if (seconds <= 0) {
                clearInterval(timer);
                countdownEl.textContent = 'Expired';
                countdownEl.style.color = '#dc3545';
                verifyBtn.disabled = true;
                verifyBtn.textContent = 'OTP Expired — Resend';
            }
        }, 1000);

        // Focus first input on load
        inputs[0].focus();
    </script>
</body>
</html>
