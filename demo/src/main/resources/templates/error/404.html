<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: white; border-radius: 20px; padding: 50px;
                      text-align: center; max-width: 450px; width: 100%; }
        .error-code { font-size: 6rem; font-weight: 700; color: #667eea; line-height: 1; }
    </style>
</head>
<body>
    <div class="error-card shadow-lg">
        <div class="error-code">404</div>
        <h3 class="fw-bold mt-2">Page Not Found</h3>
        <p class="text-muted">The page you are looking for does not exist or has been moved.</p>
        <a href="/" class="btn btn-primary mt-2 px-4">Go Home</a>
    </div>
</body>
</html>
