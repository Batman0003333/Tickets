<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Server Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #232526 0%, #414345 100%);
               min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .error-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px);
                      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;
                      padding: 50px; text-align: center; max-width: 450px;
                      width: 100%; color: white; }
        .error-code { font-size: 6rem; font-weight: 700; color: #dc3545; line-height: 1; }
    </style>
</head>
<body>
    <div class="error-card shadow-lg">
        <div class="error-code">500</div>
        <h3 class="fw-bold mt-2">Something Went Wrong</h3>
        <p class="text-white-50">An unexpected error occurred. Please try again or contact support.</p>
        <a href="/" class="btn btn-outline-light mt-2 px-4">Go Home</a>
    </div>
</body>
</html>
