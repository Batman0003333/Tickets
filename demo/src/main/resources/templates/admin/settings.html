<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Ticket Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
     
<link th:href="@{/css/ADstyles.css}" rel="stylesheet">
    
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{layout/AdminSidebar :: AdminSidebarFragment}"></div>
            

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="py-4">
                <h2>System Settings</h2>
            </div>

            <div class="row">
                <div class="col-md-3">
                    <div class="list-group">
                        <a href="#general" class="list-group-item list-group-item-action active" data-bs-toggle="list">General Settings</a>
                        <a href="#email" class="list-group-item list-group-item-action" data-bs-toggle="list">Email Configuration</a>
                        <a href="#security" class="list-group-item list-group-item-action" data-bs-toggle="list">Security</a>
                        <a href="#backup" class="list-group-item list-group-item-action" data-bs-toggle="list">Backup</a>
                    </div>
                </div>

                <div class="col-md-9">
                    <!-- General Settings -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5 class="card-title mb-0">General Settings</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">System Name</label>
                                    <input type="text" class="form-control" value="Ticket Management System">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Support Email</label>
                                    <input type="email" class="form-control" value="support@company.com">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Max Tickets per Page</label>
                                    <input type="number" class="form-control" value="10">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Session Timeout (minutes)</label>
                                    <input type="number" class="form-control" value="30">
                                </div>
                                
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </form>
                        </div>
                    </div>

                    <!-- Email Configuration -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5 class="card-title mb-0">Email Configuration</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3">
                                    <label class="form-label">SMTP Server</label>
                                    <input type="text" class="form-control" value="smtp.gmail.com">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">SMTP Port</label>
                                    <input type="number" class="form-control" value="587">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Email Username</label>
                                    <input type="email" class="form-control">
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Email Password</label>
                                    <input type="password" class="form-control">
                                </div>
                                
                                <button type="button" class="btn btn-success">Test Email</button>
                                <button type="submit" class="btn btn-primary ms-2">Save Changes</button>
                            </form>
                        </div>
                    </div>

                    <!-- Security Settings -->
                    <div class="card mb-3">
                        <div class="card-header">
                            <h5 class="card-title mb-0">Security Settings</h5>
                        </div>
                        <div class="card-body">
                            <form>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" checked>
                                    <label class="form-check-label">Enable Two-Factor Authentication</label>
                                </div>
                                
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" checked>
                                    <label class="form-check-label">Require Password Change Every 90 Days</label>
                                </div>
                                
                                <div class="mb-3">
                                    <label class="form-label">Minimum Password Length</label>
                                    <input type="number" class="form-control" value="8">
                                </div>
                                
                                <button type="submit" class="btn btn-primary">Save Changes</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
