<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Ticket Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link th:href="@{/css/ADstyles.css}" rel="stylesheet">
    
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{layout/AdminSidebar :: AdminSidebarFragment}"></div>
            

        <!-- Main Content -->
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
            <div class="py-4">
                <h2>Reports &amp; Analytics</h2>
            </div>

            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5>Ticket Status Distribution</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="statusChart"></canvas>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card">
                        <div class="card-header">
                            <h5>Tickets by Priority</h5>
                        </div>
                        <div class="card-body">
                            <canvas id="priorityChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h5>Ticket Metrics</h5>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-3 text-center">
                            <h6>Avg. Resolution Time</h6>
                            <p class="display-6">2.4 days</p>
                        </div>
                        <div class="col-md-3 text-center">
                            <h6>Open Tickets</h6>
                            <p class="display-6">28</p>
                        </div>
                        <div class="col-md-3 text-center">
                            <h6>Resolved This Month</h6>
                            <p class="display-6">98</p>
                        </div>
                        <div class="col-md-3 text-center">
                            <h6>Satisfaction Rate</h6>
                            <p class="display-6">94%</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
