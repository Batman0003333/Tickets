<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Departments - Ticket Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"> 
    
   <link th:href="@{/css/ADstyles.css}" rel="stylesheet">
    
</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
            <div th:replace="~{layout/AdminSidebar :: AdminSidebarFragment}"></div>
            

        <!-- Main Content -->
       <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4">
    <div class="d-flex justify-content-between align-items-center py-4">
        <h2>Departments Management</h2>
        <button class="btn btn-success" data-bs-toggle="modal" data-bs-target="#addDeptModal">
            <i class="bi bi-plus-circle me-2"></i>Add Department
        </button>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4" th:each="dept : ${departments}">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <h5 class="card-title fw-bold text-primary" th:text="${dept.name}">IT Support</h5>
                    <p class="card-text text-muted" th:text="${dept.description}">Department Description</p>
                    <hr class="opacity-25" />
                    <div class="d-flex justify-content-between align-items-center">
                        <span class="small">
                            <i class="bi bi-people me-1"></i> Users: <strong th:text="${dept.userCount ?: 0}">0</strong> | 
                            <i class="bi bi-ticket-perforated me-1"></i> Tickets: <strong th:text="${dept.ticketCount ?: 0}">0</strong>
                        </span>
                        <div>
                            <button class="btn btn-sm btn-outline-primary"><i class="bi bi-pencil"></i></button>
                            <button class="btn btn-sm btn-outline-danger ms-1"><i class="bi bi-trash"></i></button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>
    </div>
</div>

<!-- Add Department Modal -->
<form th:action="@{/admin/departments/add}" method="post">
    <div class="modal-body">
        <div class="mb-3">
            <label class="form-label fw-bold small">DEPARTMENT NAME</label>
            <input type="text" name="name" class="form-control bg-light" placeholder="e.g., Finance" required="required" />
        </div>
        <div class="mb-3">
            <label class="form-label fw-bold small">DESCRIPTION</label>
            <textarea class="form-control bg-light" name="description" rows="3" placeholder="Briefly describe the department's role"></textarea>
        </div>
    </div>
    <div class="modal-footer border-0">
        <button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
        <button type="submit" class="btn btn-primary px-4">Save Department</button>
    </div>
</form>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script th:inline="javascript">
    const msg = [[${message}]];
    if (msg) {
        Swal.fire({
            icon: 'success',
            title: 'Department Created',
            text: msg,
            toast: true,
            position: 'top-end',
            showConfirmButton: false,
            timer: 3000
        });
    }
</script>
</body>
</html>
