<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Ticket - Ticket Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- ✅ Fix 1: Added missing SweetAlert2 CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container-fluid">
    <div class="row">
        <div th:replace="~{layout/sidebar :: sidebarFragment}"></div>
        
        <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">
            
            <div th:if="${message}" class="alert alert-success alert-dismissible fade show border-0 shadow-sm" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i> <span th:text="${message}">Success!</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="profile-header p-5 mb-4 shadow-sm d-flex align-items-center justify-content-between">
                <div class="d-flex align-items-center">
                    <div class="avatar-placeholder rounded-circle d-flex align-items-center justify-content-center shadow">
                        <i class="bi bi-person fs-1"></i>
                    </div>
                    <div class="ms-4">
                        <h2 class="mb-0 fw-bold" th:text="${user?.firstName + ' ' + user?.lastName}">Aman Verma</h2>
                        <p class="mb-0 opacity-75" th:text="${user?.email}">user@rec.in</p>
                        <span class="badge bg-light text-primary mt-2" th:text="${user?.role}">ROLE_USER</span>
                    </div>
                </div>
                <button class="btn btn-light" onclick="window.print()">
                    <i class="bi bi-printer me-2"></i> Export Profile
                </button>
            </div>

            <div class="row">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-header bg-white border-bottom-0 py-3">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-info-circle me-2 text-primary"></i>Personal Information</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/user/profile/update}" method="post">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">FIRST NAME</label>
                                        <input type="text" name="firstName" class="form-control bg-light" th:value="${user?.firstName}" required="required" />
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label small fw-bold text-muted">LAST NAME</label>
                                        <input type="text" name="lastName" class="form-control bg-light" th:value="${user?.lastName}" required="required" />
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">CONTACT NUMBER</label>
                                        <div class="input-group">
                                            <span class="input-group-text bg-white border-end-0"><i class="bi bi-telephone text-muted"></i></span>
                                            <input type="tel" name="phoneNumber" class="form-control bg-light border-start-0" th:value="${user?.phoneNumber}" required="required" />
                                        </div>
                                    </div>
                                    <div class="col-md-12">
                                        <label class="form-label small fw-bold text-muted">EMAIL ADDRESS (Read Only)</label>
                                        <input type="email" class="form-control bg-white" th:value="${user?.email}" readonly="readonly" />
                                    </div>
                                    <div class="col-12 mt-4">
                                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm">
                        <div class="card-header bg-white border-bottom-0 py-3">
                            <h5 class="mb-0 fw-bold"><i class="bi bi-shield-lock me-2 text-danger"></i>Security &amp; Password</h5>
                        </div>
                        <div class="card-body">
                            <p class="text-muted small">Update your password regularly to keep your account secure.</p>
                            <a href="#" class="btn btn-outline-danger btn-sm px-4">Update Password</a>
                        </div>
                    </div>
                </div>

                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm mb-4">
                        <div class="card-body">
                            <h6 class="fw-bold mb-3">Organization Details</h6>
                            <div class="mb-3">
                                <label class="small text-muted d-block">DEPARTMENT</label>
                                <span class="fw-bold text-dark" th:text="${user?.departmentName}">Information Technology</span>
                            </div>
                            <div class="mb-3">
                                <label class="small text-muted d-block">ACCOUNT STATUS</label>
                                <span th:if="${user?.isActive}" class="badge bg-success-subtle text-success border border-success">ACTIVE</span>
                            </div>
                            <div class="mb-0">
                                <label class="small text-muted d-block">MEMBER SINCE</label>
                                <span class="fw-bold text-dark" 
                                      th:text="${user?.createdAt != null} ? ${#temporals.format(user.createdAt, 'dd MMM yyyy')} : 'Recently Joined'">
                                    01 Jan 2026
                                </span>
                            </div>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm bg-primary text-white text-center p-4">
                        <i class="bi bi-ticket-detailed fs-1 mb-2"></i>
                        <h4 class="fw-bold mb-0" th:text="${totalCount ?: 0}">0</h4>
                        <p class="mb-0 small opacity-75">Tickets Raised to Date</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
