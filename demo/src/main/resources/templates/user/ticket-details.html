<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ticket Details | REC Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0 mb-4">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <h4 class="mb-0 fw-bold text-dark" th:text="'Ticket: ' + ${ticket.ticketNumber}">Ticket #</h4>
                    <span th:text="${ticket.status}" class="badge rounded-pill bg-primary px-3">STATUS</span>
                </div>

                <div class="card-body">
                    <div class="p-3 bg-light rounded mb-4 border-start border-4 border-info">
                        <h6 class="text-muted small mb-1">ASSIGNED SPECIALIST</h6>
                        <span class="fw-bold" th:text="${ticket.assignedToName != null ? ticket.assignedToName : 'Pending Assignment'}">
                            Unassigned
                        </span>
                    </div>

                    <h5 class="text-muted small mb-1">ISSUE TITLE</h5>
                    <p class="fs-4 fw-semibold" th:text="${ticket.title}">Ticket Title</p>
                    <hr>
                    <h5 class="text-muted small mb-1">DESCRIPTION</h5>
                    <p class="card-text text-secondary" th:text="${ticket.description}">Description text...</p>
                    
                    <div class="row mt-4 pt-3 border-top">
                        <div class="col-6">
                            <strong>Priority:</strong> 
                            <span th:text="${ticket.priority}" 
                                  th:classappend="${ticket.priority == 'HIGH' ? 'text-danger' : 'text-muted'}">HIGH</span>
                        </div>
                        <div class="col-6 text-end text-muted small">
                            <strong>Created on:</strong> <span th:text="${ticket.createdAtStr}">Date</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0"><i class="bi bi-chat-left-text me-2 text-primary"></i>Resolution History</h5>
                </div>
                <div class="card-body">
                    <div th:if="${#lists.isEmpty(comments)}" class="text-center py-4 text-muted">
                        <i class="bi bi-hourglass-split fs-2"></i>
                        <p class="mt-2">No updates from the admin team yet.</p>
                    </div>
                    <span th:text="${ticket.status}" 
      class="badge rounded-pill px-3"
      th:classappend="${ticket.status == 'RESOLVED' ? 'bg-success' : 
                       ticket.status == 'REJECTED' ? 'bg-danger' : 
                       ticket.status == 'IN_PROGRESS' ? 'bg-info' : 'bg-primary'}">
    STATUS
</span>

                    <div th:each="c : ${comments}" class="mb-4 pb-3 border-bottom">
                        <div class="d-flex justify-content-between align-items-center">
                            <span class="fw-bold text-primary" th:text="${c.createdByName}">Admin Name</span>
                            <small class="text-muted" th:text="${#temporals.format(c.createdAt, 'dd MMM yyyy HH:mm')}">Date</small>
                        </div>
                        <div class="mt-2 p-3 bg-light rounded text-secondary shadow-sm">
                            <p class="mb-0" th:text="${c.content}">Admin comment text...</p>
                        </div>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0 py-3 text-center">
                    <a href="/user/my-tickets" class="btn btn-outline-secondary btn-sm">
                        <i class="bi bi-arrow-left me-1"></i> Back to My Tickets
                    </a>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
