<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>All Tickets - REC Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="./ADstyles.css" rel="stylesheet">

</head>
<body class="bg-light">
    <div class="container-fluid">
        <div class="row">
         <nav th:fragment="AdminSidebarFragment" class="col-md-2 d-md-block sidebar shadow">
    
                <div class="text-center mb-4">
                    <h4 class="fw-bold">REC Portal</h4>
                    <span class="badge bg-primary">ADMIN MODE</span>
                </div>
                <ul class="nav flex-column px-3">
                    <li class="nav-item mb-2"><a class="nav-link text-white " th:href="@{/admin/dashboard}"><i class="bi bi-speedometer2 me-2"></i> Dashboard</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" th:href="@{/admin/all-tickets}"><i class="bi bi-ticket-perforated me-2"></i> All Tickets</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" th:href="@{/admin/users}"><i class="bi bi-people me-2"></i> User Management</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" href="/admin/departments"><i class="bi bi-person-workspace me-2"></i>  Departments</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white" href="/admin/reports"><i class="bi bi-flag me-2"></i>  Reports</a></li>
                    <li class="nav-item mb-2"><a class="nav-link text-white " href="/admin/settings"><i class="bi bi-gear-fill me-2"></i>  Settings</a></li>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-link p-0 text-decoration-none">
                            <i class="bi bi-box-arrow-right me-2"></i>Logout
                        </button>
                    </form>
                </ul>
            </nav>
