
# Application

spring.application.name=Ticket Management System
server.port=8080
server.servlet.context-path=/

# Database

spring.datasource.url=jdbc:mysql://localhost:3306/ticket_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=0000
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool (HikariCP is Spring Boot default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000


# JPA / Hibernate

spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf

spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html


# Static resources

spring.web.resources.static-locations=classpath:/static/

# File upload

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# Session

server.servlet.session.timeout=30m


# Email (Gmail SMTP)
# Replace with your actual credentials before running

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=er.amanverma732003@gmail.com
