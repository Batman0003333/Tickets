# Application
spring.application.name=Ticket Management System
server.port=8080
server.servlet.context-path=/

# ==========================================
# Database (Cloud Ready)
# ==========================================
# Uses cloud URL/User/Pass if provided by Render, otherwise falls back to your local MySQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/ticket_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=org.postgresql.Driver


# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Thymeleaf
spring.thymeleaf.enabled=true
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Static resources
spring.web.resources.static-locations=classpath:/static/

# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Session
server.servlet.session.timeout=30m

# ==========================================
# Email (Cloud Ready)
# ==========================================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
# Use environment variables so the real password is NEVER committed to GitHub
spring.mail.username=${MAIL_USER:er.amanverma732003@gmail.com}
spring.mail.password=${MAIL_PASS:put_your_new_app_password_here_locally}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# Actuator bzpq mtpo anai gjmp
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=INFO
logging.level.com.example.tckt.demo=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE