services:
  - type: web
    name: ticketmgmt-app
    runtime: docker
    plan: free
    region: oregon
    repo: https://github.com/YOUR_USERNAME/TicketMngmt
    dockerfilePath: ./Dockerfile
    dockerContext: ./
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://ticketmgmt-db.c.aivencloud.com:21813/ticket_db?useSSL=true&serverTimezone=UTC&allowPublicKeyRetrieval=true
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: ticketmgmt-db
          property: username
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: ticketmgmt-db
          property: password
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
    healthCheckPath: /actuator/health

  - type: pserv
    name: ticketmgmt-db
    runtime: mysql
    plan: free
    region: oregon
    databaseName: ticket_db
    username: root
